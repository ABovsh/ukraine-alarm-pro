name: Validate

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Unit tests (py${{ matrix.python-version }}, HA ${{ matrix.ha-label }})
    runs-on: "ubuntu-latest"
    strategy:
      fail-fast: false
      matrix:
        include:
          # Floor: minimum supported HA on the minimum supported Python.
          - python-version: "3.12"
            ha-pin: "homeassistant==2025.1.0"
            ha-label: "min"
          # Ceiling: latest HA + deps on a current Python.
          - python-version: "3.13"
            ha-pin: ""
            ha-label: "latest"
    steps:
      - uses: "actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0" # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: "actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1" # v6
        with:
          python-version: "${{ matrix.python-version }}"
          cache: "pip"

      - name: Install test dependencies
        run: |
          python -m pip install -r requirements_test.txt
          if [ -n "${{ matrix.ha-pin }}" ]; then
            python -m pip install "${{ matrix.ha-pin }}"
          fi
          python -c "from homeassistant.const import __version__; print('HA', __version__)"

      - name: Validate JSON files
        run: |
          python -m json.tool custom_components/ukraine_alarm_pro/manifest.json >/dev/null
          python -m json.tool custom_components/ukraine_alarm_pro/strings.json >/dev/null
          python -m json.tool custom_components/ukraine_alarm_pro/translations/en.json >/dev/null
          python -m json.tool hacs.json >/dev/null

      - name: Compile integration
        run: "python -m compileall custom_components/ukraine_alarm_pro"

      - name: Lint
        run: "python -m ruff check custom_components/ukraine_alarm_pro tests"

      - name: Run tests
        run: "python -m pytest tests -q"

  validate-hacs:
    name: HACS
    runs-on: "ubuntu-latest"
    steps:
      - uses: "actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0" # v7.0.0
        with:
          persist-credentials: false
      - name: HACS validation
        uses: "hacs/action@d556e736723344f83838d08488c983a15381059a" # 22.5.0
        with:
          category: "integration"
          # Not in the home-assistant/brands repo (custom-repo only for now).
          ignore: "brands"

  validate-hassfest:
    name: Hassfest
    runs-on: "ubuntu-latest"
    steps:
      - uses: "actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0" # v7.0.0
        with:
          persist-credentials: false
      - uses: home-assistant/actions/hassfest@f4ca6f671bd429efb108c0f2fa0ae8af0215986c # master 2026-07
