name: Validate

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Unit tests (py${{ matrix.python-version }}, HA ${{ matrix.ha-label }})
    runs-on: "ubuntu-latest"
    strategy:
      fail-fast: false
      matrix:
        include:
          # Floor: oldest HA + test-helper pair whose cleanup checks know about
          # HA's safe-shutdown thread (phcc < 0.13.260 false-fails on it, so
          # HA lines older than 2025.7 can't be tested cleanly even though the
          # declared minimum stays 2025.1).
          - python-version: "3.13"
            ha-pin: "homeassistant==2025.7.0 pytest-homeassistant-custom-component==0.13.260 pycares<5"
            ha-label: "min"
          # Ceiling: latest HA + deps on a current Python.
          - python-version: "3.13"
            ha-pin: ""
            ha-label: "latest"
    steps:
      - uses: "actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0" # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: "actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1" # v6
        with:
          python-version: "${{ matrix.python-version }}"
          cache: "pip"
          cache-dependency-path: "requirements_test.txt"

      - name: Install test dependencies
        env:
          HA_PIN: "${{ matrix.ha-pin }}"
        run: |
          python -m pip install -r requirements_test.txt
          if [ -n "$HA_PIN" ]; then
            # shellcheck disable=SC2086 — intentional word-split of pin list
            python -m pip install $HA_PIN
          fi
          python -c "from homeassistant.const import __version__; print('HA', __version__)"

      - name: Validate JSON files
        run: |
          python -m json.tool custom_components/ukraine_alarm_pro/manifest.json >/dev/null
          python -m json.tool custom_components/ukraine_alarm_pro/strings.json >/dev/null
          python -m json.tool custom_components/ukraine_alarm_pro/translations/en.json >/dev/null
          python -m json.tool hacs.json >/dev/null

      - name: Compile integration
        run: "python -m compileall custom_components/ukraine_alarm_pro"

      - name: Lint
        run: "python -m ruff check custom_components/ukraine_alarm_pro tests"

      - name: Run tests
        run: "python -m pytest tests -q --cov=custom_components/ukraine_alarm_pro --cov-report=xml"

      - name: Upload coverage report
        # One leg only so two matrix legs can't race to upload the same artifact.
        if: github.event_name != 'pull_request' && matrix.ha-label == 'min'
        uses: "actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a" # v7.0.1
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 1

  sonar:
    name: SonarCloud
    needs: test
    # Gated until the SonarCloud project + SONAR_TOKEN secret exist:
    # flip repo variable SONAR_ENABLED to "true" to activate.
    if: github.event_name != 'pull_request' && vars.SONAR_ENABLED == 'true'
    runs-on: "ubuntu-latest"
    steps:
      - uses: "actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0" # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Download coverage report
        uses: "actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c" # v8.0.1
        with:
          name: coverage-xml

      - name: SonarCloud scan
        uses: "SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e" # v8.2.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: "https://sonarcloud.io"

  validate-hacs:
    name: HACS
    runs-on: "ubuntu-latest"
    steps:
      - uses: "actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0" # v7.0.0
        with:
          persist-credentials: false
      - name: HACS validation
        uses: "hacs/action@d556e736723344f83838d08488c983a15381059a" # 22.5.0
        with:
          category: "integration"
          # Not in the home-assistant/brands repo (custom-repo only for now).
          ignore: "brands"

  validate-hassfest:
    name: Hassfest
    runs-on: "ubuntu-latest"
    steps:
      - uses: "actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0" # v7.0.0
        with:
          persist-credentials: false
      - uses: home-assistant/actions/hassfest@f4ca6f671bd429efb108c0f2fa0ae8af0215986c # master 2026-07
